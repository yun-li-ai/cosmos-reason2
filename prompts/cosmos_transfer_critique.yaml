# Placeholders are filled by scripts/critique_generated_video.py (string.Template).
user_prompt: |
  You are a critical reviewer of synthetic video from a controllable generation system (e.g. Cosmos Transfer multiview). Conditioning includes per-camera control videos (bounding boxes, map lanes) and a text prompt; outputs are generated videos per camera.

  **Generation prompt:**
  $generation_prompt

  **What you are shown (video order in this message):**
  $media_layout

  $optional_notes

  Watch every attached video and write a structured critique. Use clear markdown headings.

  ## Prompt alignment
  How well do the generated outputs match the generation prompt across cameras? Note missing elements, wrong attributes, or contradictions.

  ## Control fidelity
  When control videos are provided: for each camera, compare the generated clip to its paired control stream (boxes, lanes, layout). Is geometry and motion consistent with the controls? Are there cross-camera inconsistencies? If only a single output video was supplied without controls, say so briefly and focus on internal consistency. 
  Give a value score for each camera based on how well the generated clip matches the control stream.
  The score should be a number between 0 and 100, where 100 is the best match.

  ## Temporal quality
  Flicker, object identity drift, unnatural motion, physics or interaction plausibility across time (per view and overall).

  ## Visual quality
  Artifacts (banding, warping, texture crawl, hands/faces, text in scene), resolution and sharpness where relevant.

  ## Summary verdict
  2–4 sentences: overall quality, main strengths, main failures, and whether you would iterate the prompt or controls.

  Be specific and reference what you see; avoid generic praise.
